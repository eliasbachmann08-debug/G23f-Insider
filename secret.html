<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>??? · G23f-Insider</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #17171d;
    --border: #2a2a36;
    --accent: #7c6fff;
    --accent2: #ff6f91;
    --text: #e8e8f0;
    --muted: #7a7a90;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,111,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 10;
    max-width: 600px;
    width: 100%;
    text-align: center;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(124,111,255,0.1);
    border: 1px solid rgba(124,111,255,0.25);
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
    display: inline-block;
    margin-bottom: 1.5rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 0.6rem;
  }

  .grad {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .message-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    text-align: left;
  }

  .message-box label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 0.7rem;
  }

  textarea {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    padding: 0.9rem 1rem;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  textarea::placeholder {
    color: var(--muted);
  }

  .btn {
    margin-top: 1rem;
    width: 100%;
    padding: 0.75rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.85; }

  .success {
    display: none;
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: rgba(100,220,120,0.08);
    border: 1px solid rgba(100,220,120,0.25);
    border-radius: 8px;
    color: #64dc78;
    font-size: 0.85rem;
    text-align: center;
  }

  .back {
    margin-top: 2rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .back a {
    color: var(--accent);
    text-decoration: none;
  }

  .back a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="badge">🥚 Easter Egg gefunden</div>
  <h1>Du hast es <span class="grad">gefunden.</span></h1>
  <p class="subtitle">Nicht viele schaffen das. Hast du einen Vorschlag, eine Idee oder einfach etwas zu sagen? Schreib es hier rein.</p>

  <div class="message-box">
    <label>Deine Nachricht</label>
    <textarea id="msg" placeholder="Fach-Vorschlag, Feedback, oder einfach Hallo..."></textarea>
    <button class="btn" onclick="send()">Absenden</button>
    <div class="success" id="success">✓ Nachricht gespeichert – danke!</div>
  </div>

  <div class="back"><a href="index.html">← Zurück zur Hauptseite</a></div>
</div>

<script>
  function send() {
    const msg = document.getElementById('msg').value.trim();
    if (!msg) return;
    document.getElementById('msg').value = '';
    document.getElementById('success').style.display = 'block';
    setTimeout(() => {
      document.getElementById('success').style.display = 'none';
    }, 3000);
  }
</script>
</body>
</html>
